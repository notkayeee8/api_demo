<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD API - Item Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Item Manager</h1>

        <div class="form-container">
            <h2 id="form-title">Add New Item</h2>
            <form id="item-form">
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter item name" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Enter item description" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn btn-primary">Add Item</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none">Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <h2>Items List</h2>
            <table id="items-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="items-tbody">
                    <tr><td colspan="5" class="loading">Loading items...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
